<!DOCTYPE html>
<html>
<head>

<title>Smart URL Shortener</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
<div class="container">
<span class="navbar-brand mb-0 h1">Smart URL Shortener</span>
</div>
</nav>

<div class="container mt-5">

<div class="row justify-content-center">
<div class="col-md-6">

<div class="card shadow-lg p-4">

<h3 class="text-center mb-4">Paste your long URL</h3>

<!-- <form method="POST">

<div class="mb-3">

required
>
</div>

Generate Short Link
</button>
</div>

</form> -->

<form method="POST">

<div class="mb-3">
<input
type="text"
class="form-control form-control-lg"
name="long_url"
placeholder="Enter your long URL"
required
>
</div>

<div class="mb-3">
<input
type="text"
class="form-control"
name="custom_code"
placeholder="Custom short name (optional)"
>
</div>

<div class="d-grid">
<button class="btn btn-primary btn-lg">
Generate Short Link
</button>
</div>

</form>

{% if error %}

<div class="alert alert-danger text-center">
{{ error }}
</div>

{% endif %}

{% if short_url %}

<hr>

<div class="alert alert-success text-center">

<p class="mb-2"><strong>Your Short Link:</strong></p>

<div class="input-group mb-2">

<input
type="text"
class="form-control"
value="{{ short_url }}"
id="shortLink"
readonly
>

<button class="btn btn-success" onclick="copyLink()">
Copy
</button>

</div>

<p class="text-muted">
Total Clicks: {{ clicks }}
</p>

<a href="/" class="btn btn-outline-secondary mt-2">
Shorten another URL
</a>

</div>

{% endif %}

</div>

</div>
</div>

</div>

<footer class="text-center mt-5 text-muted">
<p>Built with Flask • URL Shortener Project</p>
</footer>

<script>

function copyLink() {

var copyText = document.getElementById("shortLink");

copyText.select();
copyText.setSelectionRange(0, 99999);

navigator.clipboard.writeText(copyText.value);

alert("Link copied!");

}

</script>

</body>
</html>
